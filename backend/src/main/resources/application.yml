spring:
  application:
    name: green-juice-hub

  task:
    scheduling:
      enabled: true
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/green_juice_hub?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true&characterEncoding=UTF-8}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  mandatory-file-encoding: UTF-8
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
server:
  port: ${PORT:8081}
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

jwt:
  secret: ${JWT_SECRET:}
  access-token-expiration: 900000
  refresh-token-expiration: 604800000

otp:
  expiration-minutes: 5
  max-send-per-day: 10
  max-wrong-attempts: 3
  lock-minutes: 15

google:
  client-id: ${GOOGLE_CLIENT_ID}
  recaptcha-secret: ${RECAPTCHA_SECRET}

app:
  bank:
    bank-name: Vietcombank
    bank-bin: "970436"
    account-number: "1234567890"
    account-name: NGUYEN VAN A
  mail:
    shop-email: ${SHOP_EMAIL:}

ghn:
  token: ${GHN_TOKEN:}
  shop-id: ${GHN_SHOP_ID:0}
  base-url: https://online-gateway.ghn.vn
  from-district-id: 1454
  from-ward-code: "21201"
  service-type-id: 2

  # Dùng cho TẠO ĐƠN — staging khi test, đổi sang production khi live
  order-base-url: ${GHN_ORDER_BASE_URL:https://dev-online-gateway.ghn.vn}
  order-token: ${GHN_ORDER_TOKEN:}
  order-shop-id: ${GHN_ORDER_SHOP_ID:0}

  # Bảo mật webhook
  webhook-token: ${GHN_WEBHOOK_TOKEN:}

vnpay:
  tmn-code: YOUR_TMN_CODE
  hash-secret: YOUR_HASH_SECRET
  pay-url: https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
  return-url: https://YOUR-APP.railway.app/api/payment/vnpay/callback
  ipn-url: https://YOUR-APP.railway.app/api/payment/vnpay/ipn