spring:
  application:
    name: green-juice-hub

  task:
    scheduling:
      enabled: true
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/green_juice_hub?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true&characterEncoding=UTF-8}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  mandatory-file-encoding: UTF-8
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
server:
  port: ${PORT:8081}
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

jwt:
  secret: ${JWT_SECRET:}
#  access-token-expiration: 900000
  access-token-expiration: 3600000
  refresh-token-expiration: 604800000

otp:
  expiration-minutes: 5
  max-send-per-day: 10
  max-wrong-attempts: 3
  lock-minutes: 15

google:
  client-id: ${GOOGLE_CLIENT_ID}
  recaptcha-secret: ${RECAPTCHA_SECRET}

app:
  bank:
    bank-name: Vietcombank
    bank-bin: "970436"
    account-number: "1234567890"
    account-name: NGUYEN VAN A
  mail:
    shop-email: ${SHOP_EMAIL:}

ghn:
  token: ${GHN_TOKEN:}
  shop-id: ${GHN_SHOP_ID:0}
  base-url: https://online-gateway.ghn.vn
  from-district-id: 1454
  from-ward-code: "21201"
  service-type-id: 2

  # Bảo mật webhookf=
  webhook-token: ${GHN_WEBHOOK_TOKEN:}

logging:
  level:
    root: WARN
    com.greenjuicehub: INFO
    org.hibernate.SQL: WARN
    org.hibernate.orm.jdbc.bind: WARN
    org.hibernate.orm.jdbc: WARN
    org.springframework.web: WARN

vnpay:
  tmn-code: ${VNPAY_TMN_CODE}
  hash-secret: ${VNPAY_HASH_SECRET}
  pay-url: ${VNPAY_PAY_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
  # Return URL → FE Vercel (trang hiển thị kết quả cho user)
  return-url: ${VNPAY_RETURN_URL:https://green-juice-hub.vercel.app/payment/vnpay/result}
  # IPN URL → BE Railway (VNPay gọi server-to-server để xác nhận)
  ipn-url: ${VNPAY_IPN_URL:https://green-juice-hub-production.up.railway.app/api/payment/vnpay/ipn}

